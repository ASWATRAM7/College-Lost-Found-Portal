<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Dashboard — KEC Lost &amp; Found Portal</title>
  <meta name="description" content="Faculty admin dashboard for the Kongu Engineering College Lost and Found Portal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="faculty-theme">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    
    <!-- College brand -->
    <div class="sidebar-brand">
      <div class="brand-logo">KEC</div>
      <div class="brand-text">
        <span class="brand-name">Lost &amp; Found</span>
        <span class="brand-role">Admin Panel</span>
      </div>
    </div>

    <!-- Navigation links (empty for now — to be filled) -->
    <nav class="sidebar-nav" aria-label="Faculty Navigation">
      <p class="nav-section-label">Navigation</p>
      <ul class="nav-list" id="faculty-nav-list">
        <!-- Navigation items will be added here in the next step -->
      </ul>
    </nav>

    <!-- Sidebar footer -->
    <div class="sidebar-footer">
      <div class="user-info" id="sidebar-user-info">
        <div class="user-avatar" id="sidebar-avatar">F</div>
        <div class="user-details">
          <span class="user-name" id="sidebar-user-name">Faculty</span>
          <span class="user-email" id="sidebar-user-email">Loading...</span>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn" onclick="logout()">Logout</button>
    </div>

  </aside>

  <!-- ── MAIN CONTENT AREA ── -->
  <div class="main-wrapper">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">
        <h1 id="page-title">Admin Dashboard</h1>
      </div>
      <div class="topbar-right">
        <span class="admin-badge">Admin</span>
        <span class="topbar-greeting" id="topbar-greeting">Welcome back!</span>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" id="page-content">

      <!-- Empty state — content will be added here -->
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="8" width="20" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
            <rect x="36" y="8" width="20" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
            <rect x="8" y="36" width="20" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
            <rect x="36" y="36" width="20" height="20" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
          </svg>
        </div>
        <h2 class="empty-title">Faculty Admin Dashboard</h2>
        <p class="empty-desc">
          The admin panel is ready. Manage and monitor all lost and found items from here once the features are set up.
        </p>
      </div>

    </main>
  </div>

  <!-- Sidebar overlay (for mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <script src="dashboard.js"></script>
</body>
</html>
